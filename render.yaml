services:
  - type: web
    name: pixelgate-ops-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: pixelgate-ops
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        sync: false

databases:
  - name: pixelgate-ops-db
    plan: free
    databaseName: pixelgate_ops
